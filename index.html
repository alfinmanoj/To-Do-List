<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>To-Do-List</h1>
        <section>
            <h2>Add Items</h2>
            <div>
                <input id="itemName" type="text" placeholder="Enter a task" required>
                <button id="addBtn" type="button">Add Item</button>
            </div>
        </section>

        <section>
            <ul id="itemsList">
                <!-- Items appear here -->
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
